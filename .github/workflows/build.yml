name: Build V8 App (Clean)
on: 
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev mesa-utils

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Accept Android Licenses
        run: yes | flutter doctor --android-licenses

      - name: Setup Python
        uses: actions/setup-python@v5
        with: 
          python-version: '3.11'

      # تثبيت النسخة المستقرة بدون أخطاء
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
          pip install flet==0.80.5

      - name: Create Flet Config
        run: |
          echo '[app]' > flet.toml
          echo 'name = "HusseinV8"' >> flet.toml
          echo 'package_name = "com.husseinv8.app"' >> flet.toml

      # البناء مع إغلاق الحركات الملونة
      - name: Build APK
        env:
          FLET_CLI_NO_RICH_OUTPUT: "true"
          PYTHONIOENCODING: "utf-8"
        run: yes | flet build apk
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Hussein-V8-Release
          path: build/apk/**/*.apk
